AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Full EKS infrastructure for python-app.
  Creates: VPC, Subnets, IGW, Route Tables, IAM Roles, EKS Cluster, Managed Node Group, ECR Repos.

# ═══════════════════════════════════════════════════════
# PARAMETERS  –  values you can override at deploy time
# ═══════════════════════════════════════════════════════
Parameters:

  ClusterName:
    Type: String
    Default: python-app-cluster
    Description: Name of the EKS cluster

  KubernetesVersion:
    Type: String
    Default: "1.29"
    Description: EKS Kubernetes version

  NodeInstanceType:
    Type: String
    Default: t3.medium
    Description: EC2 instance type for worker nodes

  NodeDesiredSize:
    Type: Number
    Default: 2
    Description: Desired number of worker nodes

  NodeMinSize:
    Type: Number
    Default: 1
    Description: Minimum number of worker nodes

  NodeMaxSize:
    Type: Number
    Default: 4
    Description: Maximum number of worker nodes

  VpcCIDR:
    Type: String
    Default: 10.0.0.0/16

  PublicSubnet1CIDR:
    Type: String
    Default: 10.0.1.0/24

  PublicSubnet2CIDR:
    Type: String
    Default: 10.0.2.0/24

# ═══════════════════════════════════════════════════════
# RESOURCES
# ═══════════════════════════════════════════════════════
Resources:

  # ─────────────────────────────────────────────────────
  # 1. VPC & NETWORKING
  # ─────────────────────────────────────────────────────

  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCIDR
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub "${ClusterName}-vpc"

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub "${ClusterName}-igw"

  IGWAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnet1CIDR
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "${ClusterName}-public-subnet-1"
        # Required tags for EKS to find subnets for Load Balancers
        - Key: !Sub "kubernetes.io/cluster/${ClusterName}"
          Value: shared
        - Key: kubernetes.io/role/elb
          Value: "1"

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnet2CIDR
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "${ClusterName}-public-subnet-2"
        - Key: !Sub "kubernetes.io/cluster/${ClusterName}"
          Value: shared
        - Key: kubernetes.io/role/elb
          Value: "1"

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub "${ClusterName}-public-rt"

  DefaultPublicRoute:
    Type: AWS::EC2::Route
    DependsOn: IGWAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  Subnet1RouteTableAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  Subnet2RouteTableAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  # ─────────────────────────────────────────────────────
  # 2. SECURITY GROUPS
  # ─────────────────────────────────────────────────────

  # Security group for EKS control plane
  ControlPlaneSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: EKS Control Plane Security Group
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub "${ClusterName}-control-plane-sg"

  # ─────────────────────────────────────────────────────
  # 3. IAM ROLES
  # ─────────────────────────────────────────────────────

  # Role for EKS cluster itself
  EKSClusterRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ClusterName}-cluster-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: eks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEKSClusterPolicy

  # Role for EC2 worker nodes
  NodeGroupRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ClusterName}-nodegroup-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEKSWorkerNodePolicy
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly
        - arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy

  # ─────────────────────────────────────────────────────
  # 4. EKS CLUSTER
  # ─────────────────────────────────────────────────────

  EKSCluster:
    Type: AWS::EKS::Cluster
    Properties:
      Name: !Ref ClusterName
      Version: !Ref KubernetesVersion
      RoleArn: !GetAtt EKSClusterRole.Arn
      ResourcesVpcConfig:
        SubnetIds:
          - !Ref PublicSubnet1
          - !Ref PublicSubnet2
        SecurityGroupIds:
          - !Ref ControlPlaneSecurityGroup
        EndpointPublicAccess: true
        EndpointPrivateAccess: false
      Logging:
        ClusterLogging:
          EnabledTypes:
            - Type: api
            - Type: audit
      Tags:
        - Key: Name
          Value: !Ref ClusterName

  # ─────────────────────────────────────────────────────
  # 5. NODE GROUP (Worker Nodes)
  # ─────────────────────────────────────────────────────

  NodeGroup:
    Type: AWS::EKS::Nodegroup
    DependsOn: EKSCluster
    Properties:
      ClusterName: !Ref ClusterName
      NodegroupName: !Sub "${ClusterName}-nodegroup"
      NodeRole: !GetAtt NodeGroupRole.Arn
      InstanceTypes:
        - !Ref NodeInstanceType
      ScalingConfig:
        DesiredSize: !Ref NodeDesiredSize
        MinSize: !Ref NodeMinSize
        MaxSize: !Ref NodeMaxSize
      Subnets:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      AmiType: AL2_x86_64
      DiskSize: 20
      Tags:
        Name: !Sub "${ClusterName}-node"

  # ─────────────────────────────────────────────────────
  # 6. ECR REPOSITORIES (stores your Docker images)
  # ─────────────────────────────────────────────────────

  BackendECRRepo:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: python-app/backend
      ImageScanningConfiguration:
        ScanOnPush: true
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Keep only last 10 images",
                "selection": {
                  "tagStatus": "any",
                  "countType": "imageCountMoreThan",
                  "countNumber": 10
                },
                "action": { "type": "expire" }
              }
            ]
          }

  FrontendECRRepo:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: python-app/frontend
      ImageScanningConfiguration:
        ScanOnPush: true
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Keep only last 10 images",
                "selection": {
                  "tagStatus": "any",
                  "countType": "imageCountMoreThan",
                  "countNumber": 10
                },
                "action": { "type": "expire" }
              }
            ]
          }

# ═══════════════════════════════════════════════════════
# OUTPUTS  –  values exported for use elsewhere
# ═══════════════════════════════════════════════════════
Outputs:

  ClusterName:
    Description: EKS Cluster Name
    Value: !Ref ClusterName
    Export:
      Name: !Sub "${AWS::StackName}-ClusterName"

  ClusterEndpoint:
    Description: EKS Cluster API endpoint
    Value: !GetAtt EKSCluster.Endpoint
    Export:
      Name: !Sub "${AWS::StackName}-ClusterEndpoint"

  BackendECRUri:
    Description: ECR URI for backend image
    Value: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/python-app/backend"
    Export:
      Name: !Sub "${AWS::StackName}-BackendECR"

  FrontendECRUri:
    Description: ECR URI for frontend image
    Value: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/python-app/frontend"
    Export:
      Name: !Sub "${AWS::StackName}-FrontendECR"

  VpcId:
    Description: VPC ID
    Value: !Ref VPC
    Export:
      Name: !Sub "${AWS::StackName}-VpcId"

