---
# ─────────────────────────────────────────────────────────────────
# MongoDB Secret  –  store credentials securely
#
# HOW TO CREATE (run this ONCE before first deploy):
#   kubectl create secret generic mongodb-secret \
#     --namespace=python-app \
#     --from-literal=MONGO_URI="mongodb://mongouser:yourpassword@mongodb:27017/pythonapp"
#
# The YAML below is a placeholder reminder. Do NOT put real
# credentials in Git. Use the kubectl command above instead.
# ─────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: mongodb-secret
  namespace: python-app
type: Opaque
stringData:
  # REPLACE this value with your real MongoDB Atlas URI or local URI
  # Format: mongodb://user:password@host:port/dbname
  MONGO_URI: "mongodb://mongouser:CHANGEME@mongodb:27017/pythonapp?authSource=admin"

---
# ─────────────────────────────────────────────────────────────────
# MongoDB StatefulSet  –  runs a single MongoDB pod with a
# persistent volume so data survives pod restarts
# ─────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: python-app
spec:
  serviceName: mongodb
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
        - name: mongodb
          image: mongo:6.0
          ports:
            - containerPort: 27017
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              value: mongouser
            - name: MONGO_INITDB_ROOT_PASSWORD
              value: CHANGEME          # Use a Secret in production
            - name: MONGO_INITDB_DATABASE
              value: pythonapp
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
  # PersistentVolumeClaim template – EKS will provision an EBS volume
  volumeClaimTemplates:
    - metadata:
        name: mongo-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi

---
# ─────────────────────────────────────────────────────────────────
# MongoDB Service  –  ClusterIP (only reachable inside the cluster)
# The backend connects to host "mongodb" on port 27017
# ─────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: python-app
spec:
  selector:
    app: mongodb
  clusterIP: None   # Headless service required for StatefulSets
  ports:
    - port: 27017
      targetPort: 27017

