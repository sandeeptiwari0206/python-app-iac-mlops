name: MLOps Pipeline — MLflow + EKS + EC2

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      deploy_target:
        description: "Deploy to EC2 or EKS"
        required: true
        default: "eks"
        type: choice
        options: [eks, ec2, both]

env:
  DOCKERHUB_USER:       sandeeptiwari0206
  BACKEND_IMAGE:        python-backend
  FRONTEND_IMAGE:       python-frontend
  AWS_REGION:           ap-south-1
  EKS_CLUSTER_NAME:     python-app-eks
  K8S_NAMESPACE:        python-app

# ═══════════════════════════════════════════════════════════════
# STAGE 1 — Build Docker Images
# ═══════════════════════════════════════════════════════════════
jobs:
  build:
    name: "Stage 1 — Docker Build & Push"
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.TAG }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag (Git SHA)
        id: tag
        run: echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          platforms: linux/amd64
          push: true
          build-args: |
            APP_VERSION=1.0.${{ github.run_number }}
            BUILD_ID=${{ steps.tag.outputs.TAG }}
          tags: |
            ${{ env.DOCKERHUB_USER }}/${{ env.BACKEND_IMAGE }}:${{ steps.tag.outputs.TAG }}
            ${{ env.DOCKERHUB_USER }}/${{ env.BACKEND_IMAGE }}:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.DOCKERHUB_USER }}/${{ env.FRONTEND_IMAGE }}:${{ steps.tag.outputs.TAG }}
            ${{ env.DOCKERHUB_USER }}/${{ env.FRONTEND_IMAGE }}:latest

# ═══════════════════════════════════════════════════════════════
# STAGE 2 — MLflow: Log Build Metrics
# ═══════════════════════════════════════════════════════════════
  mlflow-log-build:
    name: "Stage 2 — MLflow Log Build"
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install MLflow
        run: pip install mlflow==2.14.1

      - name: Log build to MLflow
        env:
          MLFLOW_TRACKING_URI: ${{ vars.MLFLOW_TRACKING_URI }}
          GITHUB_SHA:          ${{ github.sha }}
          GITHUB_ACTOR:        ${{ github.actor }}
          GITHUB_REF_NAME:     ${{ github.ref_name }}
        run: |
          python mlops/pipelines/pipeline.py \
            --stage build \
            --version 1.0.${{ github.run_number }} \
            --build-id ${{ needs.build.outputs.image_tag }} \
            --env production

# ═══════════════════════════════════════════════════════════════
# STAGE 3 — MLflow: Log Test Results
# ═══════════════════════════════════════════════════════════════
  mlflow-log-test:
    name: "Stage 3 — MLflow Log Tests"
    runs-on: ubuntu-latest
    needs: [build, mlflow-log-build]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install mlflow==2.14.1 flask flask-cors pytest

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short 2>&1 | tee /tmp/test_out.txt || true

      - name: Log test results to MLflow
        env:
          MLFLOW_TRACKING_URI: ${{ vars.MLFLOW_TRACKING_URI }}
          GITHUB_SHA:          ${{ github.sha }}
          GITHUB_ACTOR:        ${{ github.actor }}
          GITHUB_REF_NAME:     ${{ github.ref_name }}
        run: |
          python mlops/pipelines/pipeline.py \
            --stage test \
            --version 1.0.${{ github.run_number }} \
            --build-id ${{ needs.build.outputs.image_tag }} \
            --env production

# ═══════════════════════════════════════════════════════════════
# STAGE 4a — Deploy to EKS
# ═══════════════════════════════════════════════════════════════
  deploy-eks:
    name: "Stage 4a — Deploy to EKS"
    runs-on: ubuntu-latest
    needs: [build, mlflow-log-test]
    if: |
      github.ref == 'refs/heads/main' &&
      (github.event.inputs.deploy_target == 'eks' ||
       github.event.inputs.deploy_target == 'both' ||
       github.event_name == 'push')

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "v1.30.0"

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name   ${{ env.EKS_CLUSTER_NAME }}

      - name: Substitute image tag in K8s manifests
        run: |
          TAG=${{ needs.build.outputs.image_tag }}
          sed -i "s/IMAGE_TAG/${TAG}/g" k8s/03-backend.yml
          sed -i "s/IMAGE_TAG/${TAG}/g" k8s/04-frontend.yml

      - name: Apply namespace and config
        run: |
          kubectl apply -f k8s/00-namespace.yml
          kubectl apply -f k8s/01-configmap-secret.yml

      - name: Deploy MLflow tracking server on EKS
        run: kubectl apply -f k8s/02-mlflow.yml

      - name: Deploy backend
        run: kubectl apply -f k8s/03-backend.yml

      - name: Deploy frontend
        run: kubectl apply -f k8s/04-frontend.yml

      - name: Apply ingress and HPA
        run: |
          kubectl apply -f k8s/05-ingress.yml
          kubectl apply -f k8s/06-hpa.yml

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/backend  -n ${{ env.K8S_NAMESPACE }} --timeout=180s
          kubectl rollout status deployment/frontend -n ${{ env.K8S_NAMESPACE }} --timeout=120s

      - name: Show running pods and ingress
        run: |
          kubectl get pods    -n ${{ env.K8S_NAMESPACE }}
          kubectl get svc     -n ${{ env.K8S_NAMESPACE }}
          kubectl get ingress -n ${{ env.K8S_NAMESPACE }}

# ═══════════════════════════════════════════════════════════════
# STAGE 4b — Deploy to EC2 (docker compose fallback)
# ═══════════════════════════════════════════════════════════════
  deploy-ec2:
    name: "Stage 4b — Deploy to EC2"
    runs-on: ubuntu-latest
    needs: [build, mlflow-log-test]
    if: |
      github.ref == 'refs/heads/main' &&
      (github.event.inputs.deploy_target == 'ec2' ||
       github.event.inputs.deploy_target == 'both')

    steps:
      - uses: actions/checkout@v4

      - name: Copy compose files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ vars.EC2_HOST }}
          username: ${{ vars.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          source:   "docker-compose.yml,monitoring/"
          target:   "/home/ubuntu/python-app"

      - name: SSH deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ vars.EC2_HOST }}
          username: ${{ vars.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/python-app
            docker pull sandeeptiwari0206/python-backend:${{ needs.build.outputs.image_tag }}
            docker pull sandeeptiwari0206/python-frontend:${{ needs.build.outputs.image_tag }}
            export IMAGE_TAG=${{ needs.build.outputs.image_tag }}
            docker compose down
            docker compose up -d
            sleep 15
            docker compose ps
            echo "EC2 deploy complete — tag ${{ needs.build.outputs.image_tag }}"

# ═══════════════════════════════════════════════════════════════
# STAGE 5 — MLflow: Log Deployment Results
# ═══════════════════════════════════════════════════════════════
  mlflow-log-deploy:
    name: "Stage 5 — MLflow Log Deploy"
    runs-on: ubuntu-latest
    needs: [build, deploy-eks]
    if: always() && needs.build.result == 'success'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install mlflow==2.14.1

      - name: Log deploy to MLflow
        env:
          MLFLOW_TRACKING_URI: ${{ vars.MLFLOW_TRACKING_URI }}
          GITHUB_SHA:          ${{ github.sha }}
          GITHUB_ACTOR:        ${{ github.actor }}
          GITHUB_REF_NAME:     ${{ github.ref_name }}
        run: |
          python mlops/pipelines/pipeline.py \
            --stage deploy \
            --version 1.0.${{ github.run_number }} \
            --build-id ${{ needs.build.outputs.image_tag }} \
            --env production

# ═══════════════════════════════════════════════════════════════
# STAGE 6 — MLflow: Post-Deploy Health Monitoring
# ═══════════════════════════════════════════════════════════════
  mlflow-log-monitor:
    name: "Stage 6 — MLflow Log Monitor"
    runs-on: ubuntu-latest
    needs: [build, mlflow-log-deploy]
    if: always() && needs.build.result == 'success'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install mlflow==2.14.1 requests

      - name: Log monitoring metrics to MLflow
        env:
          MLFLOW_TRACKING_URI: ${{ vars.MLFLOW_TRACKING_URI }}
          GITHUB_SHA:          ${{ github.sha }}
          GITHUB_ACTOR:        ${{ github.actor }}
          GITHUB_REF_NAME:     ${{ github.ref_name }}
        run: |
          python mlops/pipelines/pipeline.py \
            --stage monitor \
            --version 1.0.${{ github.run_number }} \
            --build-id ${{ needs.build.outputs.image_tag }} \
            --env production

# ═══════════════════════════════════════════════════════════════
# STAGE 7 — Notify on failure
# ═══════════════════════════════════════════════════════════════
  notify-failure:
    name: "Notify on Failure"
    runs-on: ubuntu-latest
    needs: [build, mlflow-log-build, mlflow-log-test, deploy-eks, mlflow-log-deploy, mlflow-log-monitor]
    if: failure()

    steps:
      - name: Print failure summary
        run: |
          echo "MLOps Pipeline FAILED"
          echo "Commit : ${{ github.sha }}"
          echo "Branch : ${{ github.ref_name }}"
          echo "Actor  : ${{ github.actor }}"
          echo "Run    : https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
